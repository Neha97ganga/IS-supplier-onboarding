version: "3.9"

services:

  backend:
    build: ./backend
    container_name: supplier_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/database.db:/app/database.db

  frontend:
    build: ./frontend
    container_name: supplier_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend